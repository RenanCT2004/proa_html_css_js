<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h2>HTML Forms</h2>

    <form action="/action_page.php">
        <fieldset>
            <legend>Titulo do fieldset</legend>
            <label for="fname">First name:</label><br>
            <input type="text" id="fname" name="fname" value="John"> <br>
            <label for="lname">Last name:</label><br>
            <input type="text" id="lname" name="lname" value="Doe"> <br><br>
            <input type="submit" value="submit">
        </fieldset>
    </form>

    <br><br>
    
    <label for="cars">Choose a car:</label>
    <select id="cars" name="cars" size="4" multiple>
        <option value="volvo">Volvo</option>
        <option value="saab">Saab</option>
        <option value="fiat" selected>Fiat</option>
        <option value="audi">Audi</option>
    </select>

    <textarea name="mensagem" rows="10" cols="30">
        O gato está brincando no jardim.
    </textarea>

    <textarea name="mensagem" style="width: 200px; height: 300px">
        O gato está brincando no jardim.
    </textarea>

    <br><br>

    <button type="button" onclick="alert('Hello World!')"> Clique em mim!</button>

    <br><br>

    <form action="/action_page.php">
        <input list="browsers">
        <datalist id="browsers">
            <option value="Edge"></option>
            <option value="Firefox">
            <option value="Chrome">
            <option value="Opera">
            <option value="Safari">
        </datalist>
    </form>

    <br><br>

    <form action="/action_page.php" oninput="x.value=parseInt(a.value)+parseInt(b.value)">
        0
        <input type="range"  id="a" name="a" value="50">
        100 +
        <input type="number" id="b" name="b" value="50">
        =
        <output name="x" for="a b"></output>
        <br><br>
        <input type="submit">
    </form>
</body>
</html>
